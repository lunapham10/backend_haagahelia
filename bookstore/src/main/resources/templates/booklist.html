<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Booklist</title>
    <link type="text/css" rel="stylesheet"
      href="/css/bootstrap.min.css"
      th:href="@{/css/bootstrap.min.css}" />
</head>
<body class="container">
	<div class="col-md-4">
		<h1>Books</h1>	
	</div>
    <div class="col-md-4"> Welcome
        <span  sec:authentication="name">Name</span>
	</div>
    <div class="col-md-4" style="padding:20px 0">
		<form th:action="@{/logout}" method="post">
			<input type="submit" value="Sign Out" class="btn btn-sm btn-danger"/>
		</form>
	</div>
    <table class="table table-striped">
		<tr>
		    <th>Author</th>
		    <th>Title</th>
            <th>ISBN</th>
            <th>Year</th>
            <th>Category</th>
            <th sec:authorize="hasRole('ADMIN')"> </th>
		</tr>  
    	<tr th:each = "book : ${books}">
    		<td th:text="${book.author}"></td>
    		<td th:text="${book.title}"></td>
            <td th:text="${book.isbn}"></td>
            <td th:text="${book.publicationYear}"></td>
            <td th:text="${book.category.name}"></td>  	
 				<td sec:authorize="hasRole('ADMIN')"><a th:href="@{/delete/{id}(id=${book.id})}"  class="btn btn-danger btn-sm">Delete</a></td>
                <td><a th:href="@{/edit/{id}(id=${book.id})}" class="btn btn-danger btn-sm">Edit</a></td>   
            	
    	</tr>
     </table>
	 <a href="/addbook" class="btn btn-success mb-3">Add Book</a>    	
</body>
</html>
